name: Prepare Release

on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
    - name: Ensure release token is set
      env:
        RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      run: |
        if [[ -z "$RELEASE_TOKEN" ]]; then
          echo "RELEASE_TOKEN secret is required to push tags that trigger workflows." >&2
          exit 1
        fi

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.RELEASE_TOKEN }}

    - name: Derive version
      id: version
      shell: bash
      run: |
        branch="${GITHUB_REF_NAME}"
        version="${branch#release/}"
        version="${version#v}"
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      shell: bash
      run: |
        echo "${{ steps.version.outputs.version }}" > VERSION
        if git diff --quiet; then
          echo "VERSION already up to date."
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add VERSION
        git commit -m "chore(release): set version ${{ steps.version.outputs.version }}"
        git push

    - name: Tag release
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "$tag"
