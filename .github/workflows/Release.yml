name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z). Leave empty to derive from release/vX.Y.Z branch."
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_call' && inputs.sha || github.sha }}

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
          version="${{ github.event.inputs.version }}"
        elif [[ "${{ github.event_name }}" == "workflow_call" && -n "${{ inputs.version }}" ]]; then
          version="${{ inputs.version }}"
        else
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            branch="${{ inputs.branch }}"
          else
            branch="${GITHUB_REF_NAME}"
          fi
          version="${branch#release/}"
          version="${version#v}"
        fi
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
          branch="${{ inputs.branch }}"
        else
          branch="${GITHUB_REF_NAME}"
        fi
        git fetch origin "$branch" || true
        if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
          git checkout -B "$branch" "origin/$branch"
        else
          git checkout -B "$branch"
        fi
        python3 scripts/update_version.py "${{ steps.version.outputs.version }}"

        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION library.json
          git commit -m "chore(release): set version ${{ steps.version.outputs.version }}"
          git push origin "$branch"
        fi

    - name: Create tag
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "$tag"

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_call' && !inputs.publish }}
      with:
        ref: ${{ inputs.sha }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-lib-dir=${{ github.workspace }}/build-lib" >> "$GITHUB_OUTPUT"
        echo "build-cli-dir=${{ github.workspace }}/build-cli" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (library only)
      run: >
        cmake -B ${{ steps.strings.outputs.build-lib-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=OFF
        -S ${{ github.workspace }}

    - name: Build release (library only)
      run: cmake --build ${{ steps.strings.outputs.build-lib-dir }} --config Release

    - name: Configure CMake (library + cli)
      run: >
        cmake -B ${{ steps.strings.outputs.build-cli-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=ON
        -S ${{ github.workspace }}

    - name: Build release (library + cli)
      run: cmake --build ${{ steps.strings.outputs.build-cli-dir }} --config Release

    - name: Prepare library package
      working-directory: ${{ steps.strings.outputs.build-lib-dir }}
      run: |
        # Install library to dist directory (no component filter since CLI is not built)
        cmake --install . --prefix dist
        
        # Verify library was installed
        if [ ! -f "dist/lib/libnmealib.a" ]; then
          echo "ERROR: libnmealib.a was not installed!"
          echo "Contents of dist/lib:"
          ls -la dist/lib/ || echo "dist/lib/ does not exist"
          exit 1
        fi
        
        # Create versioned package directory with proper structure
        mkdir -p nmealib-${{ needs.prepare.outputs.version }}/{lib/cmake/nmealib,include}
        
        # Copy library files
        cp dist/lib/libnmealib.a nmealib-${{ needs.prepare.outputs.version }}/lib/
        
        # Copy headers
        cp -r dist/include/* nmealib-${{ needs.prepare.outputs.version }}/include/
        
        # Copy cmake config file
        cp dist/lib/cmake/nmealib/nmealibConfig.cmake nmealib-${{ needs.prepare.outputs.version }}/lib/cmake/nmealib/
        
        # Copy documentation and license
        cp ${{ github.workspace }}/README.md nmealib-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-${{ needs.prepare.outputs.version }}/
        
        # Create tarball
        tar -czf nmealib-${{ needs.prepare.outputs.version }}-linux64.tar.gz nmealib-${{ needs.prepare.outputs.version }}/

    - name: Package cli release
      working-directory: ${{ steps.strings.outputs.build-cli-dir }}
      run: |
        cmake --install . --prefix nmealib-cli-dist
        mkdir -p nmealib-cli-${{ needs.prepare.outputs.version }}
        cp -r nmealib-cli-dist/lib nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp -r nmealib-cli-dist/include nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp -r nmealib-cli-dist/bin nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/README.md nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-cli-${{ needs.prepare.outputs.version }}/
        tar -czf nmealib-cli-${{ needs.prepare.outputs.version }}-linux64.tar.gz nmealib-cli-${{ needs.prepare.outputs.version }}/

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-linux64
        path: ${{ steps.strings.outputs.build-lib-dir }}/nmealib-${{ needs.prepare.outputs.version }}-linux64.tar.gz

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-linux64
        path: ${{ steps.strings.outputs.build-cli-dir }}/nmealib-cli-${{ needs.prepare.outputs.version }}-linux64.tar.gz

    - name: Prepare cross-linux skeleton artifacts
      shell: bash
      run: |
        mkdir -p out/skeleton
        for target in manylinux_2_17_x86_64 manylinux_2_17_aarch64 musllinux_1_2_x86_64 musllinux_1_2_aarch64; do
          cat > "out/skeleton/python-wheel-skeleton-${target}.txt" <<EOF
        Skeleton only: Linux wheel build implementation will be added in a follow-up pass.
        This lane represents target ${target} for version ${{ needs.prepare.outputs.version }} (${{ needs.prepare.outputs.tag }}).
        EOF

          cat > "out/skeleton/platformio-package-skeleton-${target}.txt" <<EOF
        Skeleton only: PlatformIO package preparation for target ${target} will be added in a follow-up pass.
        Version ${{ needs.prepare.outputs.version }} (${{ needs.prepare.outputs.tag }}).
        EOF
        done

    - name: Upload python wheel skeleton artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-wheel-skeleton-linux
        path: out/skeleton/python-wheel-skeleton-*.txt

    - name: Upload PlatformIO skeleton artifacts
      uses: actions/upload-artifact@v4
      with:
        name: platformio-package-skeleton-linux
        path: out/skeleton/platformio-package-skeleton-*.txt

    - name: Set up Python for wheel build
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build Python wheel artifact
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install build
        python -m build --wheel --outdir dist/python

    - name: Upload Python distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dist-linux
        path: dist/python/*.whl

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        name: ${{ needs.prepare.outputs.tag }}
        generate_release_notes: true
        files: |
          dist/**/*-linux64.tar.gz

  publish-python-skeleton:
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/PublishPython.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      publish: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}

  publish-platformio-skeleton:
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    uses: ./.github/workflows/PublishPlatformIO.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      source_ref: ${{ needs.prepare.outputs.tag }}
      publish: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
