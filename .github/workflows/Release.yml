name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z). Leave empty to derive from release/vX.Y.Z branch."
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_call' && inputs.sha || github.sha }}

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
          version="${{ github.event.inputs.version }}"
        elif [[ "${{ github.event_name }}" == "workflow_call" && -n "${{ inputs.version }}" ]]; then
          version="${{ inputs.version }}"
        else
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            branch="${{ inputs.branch }}"
          else
            branch="${GITHUB_REF_NAME}"
          fi
          version="${branch#release/}"
          version="${version#v}"
        fi
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
          branch="${{ inputs.branch }}"
        else
          branch="${GITHUB_REF_NAME}"
        fi
        git fetch origin "$branch" || true
        if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
          git checkout -B "$branch" "origin/$branch"
        else
          git checkout -B "$branch"
        fi
        python3 scripts/update_version.py "${{ steps.version.outputs.version }}"

        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION library.json
          git commit -m "chore(release): set version ${{ steps.version.outputs.version }}"
          git push origin "$branch"
        fi

    - name: Create tag
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "$tag"

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_call' && !inputs.publish }}
      with:
        ref: ${{ inputs.sha }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-lib-dir=${{ github.workspace }}/build-lib" >> "$GITHUB_OUTPUT"
        echo "build-cli-dir=${{ github.workspace }}/build-cli" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (library only)
      run: >
        cmake -B ${{ steps.strings.outputs.build-lib-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=OFF
        -S ${{ github.workspace }}

    - name: Build release (library only)
      run: cmake --build ${{ steps.strings.outputs.build-lib-dir }} --config Release

    - name: Configure CMake (library + cli)
      run: >
        cmake -B ${{ steps.strings.outputs.build-cli-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=ON
        -S ${{ github.workspace }}

    - name: Build release (library + cli)
      run: cmake --build ${{ steps.strings.outputs.build-cli-dir }} --config Release

    - name: Prepare library package
      working-directory: ${{ steps.strings.outputs.build-lib-dir }}
      run: |
        # Install library to dist directory (no component filter since CLI is not built)
        cmake --install . --prefix dist
        
        # Verify library was installed
        if [ ! -f "dist/lib/libnmealib.a" ]; then
          echo "ERROR: libnmealib.a was not installed!"
          echo "Contents of dist/lib:"
          ls -la dist/lib/ || echo "dist/lib/ does not exist"
          exit 1
        fi
        
        # Create versioned package directory with proper structure
        mkdir -p nmealib-${{ needs.prepare.outputs.version }}/{lib/cmake/nmealib,include}
        
        # Copy library files
        cp dist/lib/libnmealib.a nmealib-${{ needs.prepare.outputs.version }}/lib/
        
        # Copy headers
        cp -r dist/include/* nmealib-${{ needs.prepare.outputs.version }}/include/
        
        # Copy cmake config file
        cp dist/lib/cmake/nmealib/nmealibConfig.cmake nmealib-${{ needs.prepare.outputs.version }}/lib/cmake/nmealib/
        
        # Copy documentation and license
        cp ${{ github.workspace }}/README.md nmealib-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-${{ needs.prepare.outputs.version }}/
        
        # Create tarball
        tar -czf nmealib-${{ needs.prepare.outputs.version }}-linux64.tar.gz nmealib-${{ needs.prepare.outputs.version }}/

    - name: Package cli release
      working-directory: ${{ steps.strings.outputs.build-cli-dir }}
      run: |
        cmake --install . --prefix nmealib-cli-dist
        mkdir -p nmealib-cli-${{ needs.prepare.outputs.version }}
        cp -r nmealib-cli-dist/lib nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp -r nmealib-cli-dist/include nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp -r nmealib-cli-dist/bin nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/README.md nmealib-cli-${{ needs.prepare.outputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-cli-${{ needs.prepare.outputs.version }}/
        tar -czf nmealib-cli-${{ needs.prepare.outputs.version }}-linux64.tar.gz nmealib-cli-${{ needs.prepare.outputs.version }}/

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-linux64
        path: ${{ steps.strings.outputs.build-lib-dir }}/nmealib-${{ needs.prepare.outputs.version }}-linux64.tar.gz

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-linux64
        path: ${{ steps.strings.outputs.build-cli-dir }}/nmealib-cli-${{ needs.prepare.outputs.version }}-linux64.tar.gz

    - name: Prepare cross-linux skeleton artifacts
      shell: bash
      run: |
        mkdir -p out/skeleton
        for target in manylinux_2_17_x86_64 manylinux_2_17_aarch64 musllinux_1_2_x86_64 musllinux_1_2_aarch64; do
          cat > "out/skeleton/python-wheel-skeleton-${target}.txt" <<EOF
        Skeleton only: Linux wheel build implementation will be added in a follow-up pass.
        This lane represents target ${target} for version ${{ needs.prepare.outputs.version }} (${{ needs.prepare.outputs.tag }}).
        EOF
        done

    - name: Upload python wheel skeleton artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-wheel-skeleton-linux
        path: out/skeleton/python-wheel-skeleton-*.txt

    - name: Set up Python for wheel build
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build Python manylinux wheel artifact
      shell: bash
      env:
        CIBW_PLATFORM: linux
        CIBW_ARCHS_LINUX: x86_64
        CIBW_BUILD: cp312-manylinux_x86_64
        CIBW_SKIP: "*-musllinux*"
      run: |
        python -m pip install --upgrade pip
        python -m pip install cibuildwheel
        python -m cibuildwheel --output-dir dist/python

    - name: Upload Python distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dist-linux
        path: dist/python/*.whl

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Generate release notes from previous release
      id: release_notes
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const tagName = '${{ needs.prepare.outputs.tag }}';

          let previousTagName;
          try {
            const latest = await github.rest.repos.getLatestRelease({ owner, repo });
            if (latest.data.tag_name && latest.data.tag_name !== tagName) {
              previousTagName = latest.data.tag_name;
            }
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
          }

          const params = { owner, repo, tag_name: tagName };
          if (previousTagName) {
            params.previous_tag_name = previousTagName;
          }

          const notes = await github.rest.repos.generateReleaseNotes(params);
          core.setOutput('body', notes.data.body || '');
          core.setOutput('previous_tag', previousTagName || '');

    - name: Log release notes range
      shell: bash
      run: |
        if [[ -n "${{ steps.release_notes.outputs.previous_tag }}" ]]; then
          echo "Generated notes from ${{ steps.release_notes.outputs.previous_tag }} to ${{ needs.prepare.outputs.tag }}"
        else
          echo "Generated notes for ${{ needs.prepare.outputs.tag }} (no previous release found)"
        fi

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        name: ${{ needs.prepare.outputs.tag }}
        body: ${{ steps.release_notes.outputs.body }}
        files: |
          dist/**/*-linux64.tar.gz

  collect-python-dist:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: read
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Validate collected wheel artifacts
      shell: bash
      run: |
        echo "Release tag: ${{ needs.prepare.outputs.tag }}"
        echo "Version: ${{ needs.prepare.outputs.version }}"
        ls -la dist/python-wheels || true

        wheel_count=$(find dist/python-wheels -maxdepth 1 -name '*.whl' | wc -l)
        if [ "$wheel_count" -eq 0 ]; then
          echo "No wheel artifacts found to publish."
          exit 1
        fi

        python -m pip install --upgrade pip
        python -m pip install twine
        python -m twine check dist/python-wheels/*.whl

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: [prepare, collect-python-dist]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - name: Build TestPyPI-only manylinux wheel as nmealib-test
      shell: bash
      env:
        CIBW_PLATFORM: linux
        CIBW_ARCHS_LINUX: x86_64
        CIBW_BUILD: cp312-manylinux_x86_64
        CIBW_SKIP: "*-musllinux*"
      run: |
        python -m pip install --upgrade pip
        python -m pip install cibuildwheel

        python - <<'PY'
        from pathlib import Path

        pyproject = Path("pyproject.toml")
        text = pyproject.read_text(encoding="utf-8")
        if 'name = "nmealib"' not in text:
            raise SystemExit("Could not find 'name = \"nmealib\"' in pyproject.toml")
        pyproject.write_text(text.replace('name = "nmealib"', 'name = "nmealib-test"', 1), encoding="utf-8")
        print("Temporarily set project.name to nmealib-test for TestPyPI build")
        PY

        python -m cibuildwheel --output-dir dist/python-wheels-test

    - name: Validate TestPyPI wheel
      shell: bash
      run: |
        python -m pip install twine
        python -m twine check dist/python-wheels-test/*.whl

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/python-wheels-test
        attestations: false
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: read
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/python-wheels
        attestations: false
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}

  publish-platformio:
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    uses: ./.github/workflows/PublishPlatformIO.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      source_ref: ${{ needs.prepare.outputs.tag }}
      owner: ${{ github.repository_owner }}
      publish: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    secrets:
      PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
