name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z). Leave empty to derive from release/vX.Y.Z branch."
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      branch:
        required: true
        type: string
      sha:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event_name == 'workflow_call' && inputs.sha || github.sha }}

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
          version="${{ github.event.inputs.version }}"
        elif [[ "${{ github.event_name }}" == "workflow_call" && -n "${{ inputs.version }}" ]]; then
          version="${{ inputs.version }}"
        else
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            branch="${{ inputs.branch }}"
          else
            branch="${GITHUB_REF_NAME}"
          fi
          version="${branch#release/}"
          version="${version#v}"
        fi
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        echo "${{ steps.version.outputs.version }}" > VERSION
        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): set version ${{ steps.version.outputs.version }}"
          git push
        fi

    - name: Create tag
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "$tag"

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - uses: actions/checkout@v4
      if: ${{ github.event_name == 'workflow_call' && !inputs.publish }}
      with:
        ref: ${{ inputs.sha }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-lib-dir=${{ github.workspace }}/build-lib" >> "$GITHUB_OUTPUT"
        echo "build-cli-dir=${{ github.workspace }}/build-cli" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (library only)
      run: >
        cmake -B ${{ steps.strings.outputs.build-lib-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=OFF
        -S ${{ github.workspace }}

    - name: Build release (library only)
      run: cmake --build ${{ steps.strings.outputs.build-lib-dir }} --config Release

    - name: Configure CMake (library + cli)
      run: >
        cmake -B ${{ steps.strings.outputs.build-cli-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=ON
        -S ${{ github.workspace }}

    - name: Build release (library + cli)
      run: cmake --build ${{ steps.strings.outputs.build-cli-dir }} --config Release

    - name: Package library release
      working-directory: ${{ steps.strings.outputs.build-lib-dir }}
      run: |
        cmake --install . --prefix nmealib
        tar -czf nmealib-linux64.tar.gz nmealib/

    - name: Package cli release
      working-directory: ${{ steps.strings.outputs.build-cli-dir }}
      run: |
        cmake --install . --prefix nmealib-cli
        tar -czf nmealib-cli-linux64.tar.gz nmealib-cli/

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-linux64
        path: ${{ steps.strings.outputs.build-lib-dir }}/nmealib-linux64.tar.gz

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-linux64
        path: ${{ steps.strings.outputs.build-cli-dir }}/nmealib-cli-linux64.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux]
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.publish }}
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        name: ${{ needs.prepare.outputs.tag }}
        generate_release_notes: true
        files: |
          dist/**/nmealib-linux64.tar.gz
          dist/**/nmealib-cli-linux64.tar.gz
