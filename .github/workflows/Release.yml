name: Release

on:
  push:
    branches: [ "release/**" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z). Leave empty to derive from release/vX.Y.Z branch."
        required: false
        type: string
      publish:
        description: "Publish outputs (false runs release checks/build only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.event.created == true)) }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      branch: ${{ steps.meta.outputs.branch }}
      publish: ${{ steps.meta.outputs.publish }}
      source_ref: ${{ steps.source_ref.outputs.source_ref }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Derive release metadata
      id: meta
      shell: bash
      run: |
        branch="${GITHUB_REF_NAME}"

        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
          version="${{ github.event.inputs.version }}"
        else
          version="${branch#release/}"
          version="${version#v}"
        fi

        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi

        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          publish="${{ github.event.inputs.publish }}"
        else
          publish="true"
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "publish=$publish" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      if: ${{ steps.meta.outputs.publish == 'true' }}
      shell: bash
      run: |
        branch="${{ steps.meta.outputs.branch }}"
        git fetch origin "$branch" || true
        if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
          git checkout -B "$branch" "origin/$branch"
        else
          git checkout -B "$branch"
        fi
        python3 scripts/update_version.py "${{ steps.meta.outputs.version }}"

        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION library.json
          git commit -m "chore(release): set version ${{ steps.meta.outputs.version }}"
          git push origin "$branch"
        fi

    - name: Create tag
      if: ${{ steps.meta.outputs.publish == 'true' }}
      shell: bash
      run: |
        tag="${{ steps.meta.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.meta.outputs.version }}"
        git push origin "$tag"

    - name: Resolve source ref
      id: source_ref
      shell: bash
      run: |
        if [[ "${{ steps.meta.outputs.publish }}" == "true" ]]; then
          echo "source_ref=refs/tags/${{ steps.meta.outputs.tag }}" >> "$GITHUB_OUTPUT"
        else
          echo "source_ref=refs/heads/${{ steps.meta.outputs.branch }}" >> "$GITHUB_OUTPUT"
        fi

  tests:
    needs: prepare
    uses: ./.github/workflows/Test.yml
    with:
      ref: ${{ needs.prepare.outputs.source_ref }}

  build:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    uses: ./.github/workflows/Build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      publish: true

  publish-github:
    needs: [prepare, build, tests]
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/PublishGitHub.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      publish: true

  publish-python:
    needs: [prepare, build, tests]
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    uses: ./.github/workflows/PublishPython.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      publish: true
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-platformio:
    needs: [prepare, build, tests]
    if: ${{ needs.prepare.outputs.publish == 'true' }}
    uses: ./.github/workflows/PublishPlatformIO.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      owner: ${{ github.repository_owner }}
      publish: true
    secrets:
      PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}

  cleanup-release-branch:
    runs-on: ubuntu-latest
    needs: [prepare, publish-github, publish-python, publish-platformio]
    if: ${{ always() && needs.prepare.outputs.publish == 'true' && github.event_name == 'push' && github.event.created == true && needs.publish-github.result == 'success' && needs.publish-python.result == 'success' && needs.publish-platformio.result == 'success' }}
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Delete release branch after successful publish
      shell: bash
      run: |
        branch="${{ needs.prepare.outputs.branch }}"
        if [[ -z "$branch" || "$branch" == "main" || "$branch" == "master" ]]; then
          echo "Skipping branch deletion for protected or invalid branch: $branch"
          exit 0
        fi

        git push origin --delete "$branch" \
          && echo "Deleted release branch: $branch" \
          || echo "Branch deletion skipped (likely protected)."
