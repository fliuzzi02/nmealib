name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z)"
        required: true
        type: string
      publish_github:
        description: "Publish to GitHub (tag + release)"
        required: false
        type: boolean
        default: false
      publish_platformio:
        description: "Publish to PlatformIO"
        required: false
        type: boolean
        default: false
      publish_pypi:
        description: "Publish to PyPI"
        required: false
        type: boolean
        default: false
      publish_testpypi:
        description: "Publish to TestPyPI"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      branch: ${{ steps.meta.outputs.branch }}
      publish_github: ${{ steps.meta.outputs.publish_github }}
      publish_platformio: ${{ steps.meta.outputs.publish_platformio }}
      publish_pypi: ${{ steps.meta.outputs.publish_pypi }}
      publish_testpypi: ${{ steps.meta.outputs.publish_testpypi }}
      source_ref: ${{ steps.source_ref.outputs.source_ref }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Derive release metadata
      id: meta
      shell: bash
      run: |
        branch="${GITHUB_REF_NAME}"
        version="${{ github.event.inputs.version }}"
        publish_github="${{ github.event.inputs.publish_github }}"
        publish_platformio="${{ github.event.inputs.publish_platformio }}"
        publish_pypi="${{ github.event.inputs.publish_pypi }}"
        publish_testpypi="${{ github.event.inputs.publish_testpypi }}"

        if [[ "$branch" != "main" && ("$publish_github" == "true" || "$publish_platformio" == "true" || "$publish_pypi" == "true") ]]; then
          echo "GitHub/PyPI/PlatformIO publishing must be run from main. Current ref: $branch" >&2
          exit 1
        fi

        if [[ "$publish_github" != "true" && "$publish_platformio" != "true" && "$publish_pypi" != "true" && "$publish_testpypi" != "true" ]]; then
          echo "Select at least one publish target." >&2
          exit 1
        fi

        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"
        echo "branch=$branch" >> "$GITHUB_OUTPUT"
        echo "publish_github=$publish_github" >> "$GITHUB_OUTPUT"
        echo "publish_platformio=$publish_platformio" >> "$GITHUB_OUTPUT"
        echo "publish_pypi=$publish_pypi" >> "$GITHUB_OUTPUT"
        echo "publish_testpypi=$publish_testpypi" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      if: ${{ steps.meta.outputs.publish_github == 'true' || steps.meta.outputs.publish_platformio == 'true' || steps.meta.outputs.publish_pypi == 'true' || steps.meta.outputs.publish_testpypi == 'true' }}
      shell: bash
      run: |
        branch="${{ steps.meta.outputs.branch }}"
        git fetch origin "$branch" || true
        if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
          git checkout -B "$branch" "origin/$branch"
        else
          git checkout -B "$branch"
        fi
        python3 scripts/update_version.py "${{ steps.meta.outputs.version }}"

        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION library.json
          git commit -m "chore(release): set version ${{ steps.meta.outputs.version }}"
          git push origin "$branch"
        fi

    - name: Create tag
      if: ${{ steps.meta.outputs.publish_github == 'true' }}
      shell: bash
      run: |
        tag="${{ steps.meta.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.meta.outputs.version }}"
        git push origin "$tag"

    - name: Resolve source ref
      id: source_ref
      shell: bash
      run: |
        if [[ "${{ steps.meta.outputs.publish_github }}" == "true" ]]; then
          echo "source_ref=refs/tags/${{ steps.meta.outputs.tag }}" >> "$GITHUB_OUTPUT"
        else
          echo "source_ref=refs/heads/${{ steps.meta.outputs.branch }}" >> "$GITHUB_OUTPUT"
        fi

  tests:
    needs: prepare
    uses: ./.github/workflows/Test.yml
    with:
      ref: ${{ needs.prepare.outputs.source_ref }}

  build:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.publish_github == 'true' || needs.prepare.outputs.publish_pypi == 'true' }}
    uses: ./.github/workflows/Build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      publish: true

  publish-github:
    needs: [prepare, build, tests]
    if: ${{ needs.prepare.outputs.publish_github == 'true' }}
    permissions:
      contents: write
    uses: ./.github/workflows/PublishGitHub.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      publish: true

  publish-python:
    needs: [prepare, build, tests]
    if: ${{ needs.prepare.outputs.publish_pypi == 'true' }}
    uses: ./.github/workflows/PublishPython.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      publish: true
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.publish_testpypi == 'true' }}
    uses: ./.github/workflows/PublishTestPyPI.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      publish: true
    secrets:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-platformio:
    needs: [prepare, tests]
    if: ${{ needs.prepare.outputs.publish_platformio == 'true' }}
    uses: ./.github/workflows/PublishPlatformIO.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      tag: ${{ needs.prepare.outputs.tag }}
      source_ref: ${{ needs.prepare.outputs.source_ref }}
      owner: ${{ github.repository_owner }}
      publish: true
    secrets:
      PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
