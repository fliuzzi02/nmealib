name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z). Leave empty to derive from release/vX.Y.Z branch."
        required: false
        type: string
  push:
    branches:
      - "release/v*"

jobs:
  prepare:
    runs-on: ubuntu-20.04
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Derive version
      id: version
      shell: bash
      run: |
        if [[ -n "${{ github.event.inputs.version }}" ]]; then
          version="${{ github.event.inputs.version }}"
        else
          branch="${GITHUB_REF_NAME}"
          version="${branch#release/}"
          version="${version#v}"
        fi
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version: $version" >&2
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=v$version" >> "$GITHUB_OUTPUT"

    - name: Update VERSION
      shell: bash
      run: |
        echo "${{ steps.version.outputs.version }}" > VERSION
        if git diff --quiet; then
          echo "VERSION already up to date."
        else
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(release): set version ${{ steps.version.outputs.version }}"
          git push
        fi

    - name: Create tag
      shell: bash
      run: |
        tag="${{ steps.version.outputs.tag }}"
        if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
          echo "Tag already exists: $tag"
          exit 0
        fi
        git tag -a "$tag" -m "Release ${{ steps.version.outputs.version }}"
        git push origin "$tag"

  build-linux:
    runs-on: ubuntu-20.04
    needs: prepare
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DBUILD_CLI=ON
        -S ${{ github.workspace }}

    - name: Build release
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config Release

    - name: Package library release
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        cmake --install . --component library --prefix nmealib
        tar -czf nmealib-linux64.tar.gz nmealib/

    - name: Package cli release
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        cmake --install . --component library --prefix nmealib-cli
        cmake --install . --component cli --prefix nmealib-cli
        tar -czf nmealib-cli-linux64.tar.gz nmealib-cli/

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-linux64
        path: ${{ steps.strings.outputs.build-output-dir }}/nmealib-linux64.tar.gz

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-linux64
        path: ${{ steps.strings.outputs.build-output-dir }}/nmealib-cli-linux64.tar.gz

  build-windows:
    runs-on: windows-latest
    needs: prepare
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ needs.prepare.outputs.tag }}

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_CLI=ON

    - name: Build release
      run: cmake --build build --config Release

    - name: Package library release
      shell: pwsh
      working-directory: build
      run: |
        cmake --install . --config Release --component library --prefix nmealib
        Compress-Archive -Path nmealib\* -DestinationPath nmealib-win64.zip

    - name: Package cli release
      shell: pwsh
      working-directory: build
      run: |
        cmake --install . --config Release --component library --prefix nmealib-cli
        cmake --install . --config Release --component cli --prefix nmealib-cli
        Compress-Archive -Path nmealib-cli\* -DestinationPath nmealib-cli-win64.zip

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-win64
        path: build/nmealib-win64.zip

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-win64
        path: build/nmealib-cli-win64.zip

  publish:
    runs-on: ubuntu-20.04
    needs: [prepare, build-linux, build-windows]
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.prepare.outputs.tag }}
        name: ${{ needs.prepare.outputs.tag }}
        generate_release_notes: true
        files: |
          dist/**/nmealib-linux64.tar.gz
          dist/**/nmealib-cli-linux64.tar.gz
          dist/**/nmealib-win64.zip
          dist/**/nmealib-cli-win64.zip
