name: Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-lib-dir=${{ github.workspace }}/build-lib" >> "$GITHUB_OUTPUT"
        echo "build-cli-dir=${{ github.workspace }}/build-cli" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (library only)
      run: >
        cmake -B ${{ steps.strings.outputs.build-lib-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=OFF
        -S ${{ github.workspace }}

    - name: Build release (library only)
      run: cmake --build ${{ steps.strings.outputs.build-lib-dir }} --config Release --parallel "$(nproc)"

    - name: Configure CMake (library + cli)
      run: >
        cmake -B ${{ steps.strings.outputs.build-cli-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DCMAKE_SHARED_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
        -DBUILD_CLI=ON
        -S ${{ github.workspace }}

    - name: Build release (library + cli)
      run: cmake --build ${{ steps.strings.outputs.build-cli-dir }} --config Release --parallel "$(nproc)"

    - name: Prepare library package
      working-directory: ${{ steps.strings.outputs.build-lib-dir }}
      run: |
        cmake --install . --prefix dist

        if [ ! -f "dist/lib/libnmealib.a" ]; then
          echo "ERROR: libnmealib.a was not installed!"
          ls -la dist/lib/ || echo "dist/lib/ does not exist"
          exit 1
        fi

        mkdir -p nmealib-${{ inputs.version }}/{lib/cmake/nmealib,include}
        cp dist/lib/libnmealib.a nmealib-${{ inputs.version }}/lib/
        cp -r dist/include/* nmealib-${{ inputs.version }}/include/
        cp dist/lib/cmake/nmealib/nmealibConfig.cmake nmealib-${{ inputs.version }}/lib/cmake/nmealib/
        cp ${{ github.workspace }}/README.md nmealib-${{ inputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-${{ inputs.version }}/
        tar -czf nmealib-${{ inputs.version }}-linux64.tar.gz nmealib-${{ inputs.version }}/

    - name: Package cli release
      working-directory: ${{ steps.strings.outputs.build-cli-dir }}
      run: |
        cmake --install . --prefix nmealib-cli-dist
        mkdir -p nmealib-cli-${{ inputs.version }}
        cp -r nmealib-cli-dist/lib nmealib-cli-${{ inputs.version }}/
        cp -r nmealib-cli-dist/include nmealib-cli-${{ inputs.version }}/
        cp -r nmealib-cli-dist/bin nmealib-cli-${{ inputs.version }}/
        cp ${{ github.workspace }}/README.md nmealib-cli-${{ inputs.version }}/
        cp ${{ github.workspace }}/LICENSE nmealib-cli-${{ inputs.version }}/
        tar -czf nmealib-cli-${{ inputs.version }}-linux64.tar.gz nmealib-cli-${{ inputs.version }}/

    - name: Upload library artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-linux64
        path: ${{ steps.strings.outputs.build-lib-dir }}/nmealib-${{ inputs.version }}-linux64.tar.gz

    - name: Upload cli artifact
      uses: actions/upload-artifact@v4
      with:
        name: nmealib-cli-linux64
        path: ${{ steps.strings.outputs.build-cli-dir }}/nmealib-cli-${{ inputs.version }}-linux64.tar.gz

    - name: Set up Python for wheel build
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build Python manylinux wheel artifact
      shell: bash
      env:
        CIBW_PLATFORM: linux
        CIBW_ARCHS_LINUX: x86_64
        CIBW_BUILD: cp312-manylinux_x86_64
        CIBW_SKIP: "*-musllinux*"
      run: |
        python -m pip install --upgrade pip
        python -m pip install cibuildwheel
        python -m cibuildwheel --output-dir dist/python

    - name: Upload Python distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-dist-linux
        path: dist/python/*.whl
