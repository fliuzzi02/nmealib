name: Static Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang-tidy cppcheck cmake g++ make

      - name: Configure (enable static analysis)
        run: cmake -S . -B build -DENABLE_STATIC_ANALYSIS=ON

      - name: Run static analysis via CMake target
        run: cmake --build build --target static-analysis -- -j$(nproc)

      - name: Upload static-analysis log
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-log
          path: build
