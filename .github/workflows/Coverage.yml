name: Coverage

on:
  pull_request:
    types: [closed]
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout merged PR commit
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}

    - name: Checkout main branch (manual dispatch)
      if: ${{ github.event_name == 'workflow_dispatch' }}
      uses: actions/checkout@v4
      with:
        ref: refs/heads/main

    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    - name: Configure CMake
      run: >
        cmake -B build
        -S .
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_TESTS=ON
        -DBUILD_TESTING=ON
        -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Run all tests
      working-directory: build
      run: ctest --output-on-failure --no-tests=error

    - name: Generate coverage report
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/googletest/*' '*/googlemock/*' '*/_deps/*' --output-file coverage.info.filtered --ignore-errors unused
        lcov --list coverage.info.filtered

    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: build/coverage.info.filtered
        format: lcov
