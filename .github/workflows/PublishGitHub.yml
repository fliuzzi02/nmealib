name: Publish GitHub

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish-github-release:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist

    - name: Generate release notes from previous release
      id: release_notes
      uses: actions/github-script@v7
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const tagName = '${{ inputs.tag }}';

          let previousTagName;
          try {
            const latest = await github.rest.repos.getLatestRelease({ owner, repo });
            if (latest.data.tag_name && latest.data.tag_name !== tagName) {
              previousTagName = latest.data.tag_name;
            }
          } catch (error) {
            if (error.status !== 404) {
              throw error;
            }
          }

          const params = { owner, repo, tag_name: tagName };
          if (previousTagName) {
            params.previous_tag_name = previousTagName;
          }

          const notes = await github.rest.repos.generateReleaseNotes(params);
          core.setOutput('body', notes.data.body || '');
          core.setOutput('previous_tag', previousTagName || '');

    - name: Log release notes range
      shell: bash
      run: |
        if [[ -n "${{ steps.release_notes.outputs.previous_tag }}" ]]; then
          echo "Generated notes from ${{ steps.release_notes.outputs.previous_tag }} to ${{ inputs.tag }}"
        else
          echo "Generated notes for ${{ inputs.tag }} (no previous release found)"
        fi

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        body: ${{ steps.release_notes.outputs.body }}
        files: |
          dist/**/*-linux64.tar.gz
