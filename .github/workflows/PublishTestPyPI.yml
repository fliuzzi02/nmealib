name: Publish TestPyPI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      TEST_PYPI_API_TOKEN:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build TestPyPI-only wheel as nmealib-test
      shell: bash
      run: |
        echo "Release tag: ${{ inputs.tag }}"
        echo "Version: ${{ inputs.version }}"

        python -m pip install --upgrade pip
        python -m pip install cibuildwheel

        python - <<'PY'
        from pathlib import Path

        pyproject = Path("pyproject.toml")
        text = pyproject.read_text(encoding="utf-8")
        if 'name = "nmealib"' not in text:
            raise SystemExit("Could not find 'name = \"nmealib\"' in pyproject.toml")
        pyproject.write_text(text.replace('name = "nmealib"', 'name = "nmealib-test"', 1), encoding="utf-8")
        print("Temporarily set project.name to nmealib-test for TestPyPI build")
        PY

        CIBW_PLATFORM=linux \
        CIBW_ARCHS_LINUX=x86_64 \
        CIBW_BUILD=cp312-manylinux_x86_64 \
        CIBW_SKIP='*-musllinux*' \
        python -m cibuildwheel --output-dir dist/python-wheels-test

    - name: Validate built TestPyPI wheel
      shell: bash
      run: |
        python -m pip install twine
        python -m twine check dist/python-wheels-test/*.whl

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/python-wheels-test
        attestations: false
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
