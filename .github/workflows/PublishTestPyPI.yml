name: Publish TestPyPI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      TEST_PYPI_API_TOKEN:
        required: true
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    permissions:
      contents: read
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Validate collected wheel artifacts
      shell: bash
      run: |
        echo "Release tag: ${{ inputs.tag }}"
        echo "Version: ${{ inputs.version }}"
        ls -la dist/python-wheels || true

        wheel_count=$(find dist/python-wheels -maxdepth 1 -name '*.whl' | wc -l)
        if [ "$wheel_count" -eq 0 ]; then
          echo "No wheel artifacts found to publish."
          exit 1
        fi

        python -m pip install --upgrade pip
        python -m pip install twine
        python -m twine check dist/python-wheels/*.whl

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/python-wheels
        attestations: false
        user: __token__
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
