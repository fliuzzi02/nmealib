name: Publish Python (Skeleton)

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  collect-wheel-artifacts:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    steps:
    - name: Download Linux wheel skeleton artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-wheel-skeleton-*
        path: dist/python-wheels-skeleton
        merge-multiple: true

    - name: Show collected wheel skeleton artifacts
      shell: bash
      run: |
        echo "Release tag: ${{ inputs.tag }}"
        echo "Version: ${{ inputs.version }}"
        ls -la dist/python-wheels-skeleton || true

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: collect-wheel-artifacts
    if: ${{ inputs.publish }}
    permissions:
      contents: read
      id-token: write
    steps:
    - name: TestPyPI publish skeleton placeholder
      shell: bash
      run: |
        echo "TODO: publish Linux wheels to TestPyPI via trusted publishing."
        echo "Tag: ${{ inputs.tag }} | Version: ${{ inputs.version }}"

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: ${{ inputs.publish }}
    permissions:
      contents: read
      id-token: write
    steps:
    - name: PyPI publish skeleton placeholder
      shell: bash
      run: |
        echo "TODO: publish Linux wheels to PyPI via trusted publishing."
        echo "Tag: ${{ inputs.tag }} | Version: ${{ inputs.version }}"
