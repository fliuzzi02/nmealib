name: Publish Python (Skeleton)

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  collect-wheel-artifacts:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Validate collected wheel artifacts
      shell: bash
      run: |
        echo "Release tag: ${{ inputs.tag }}"
        echo "Version: ${{ inputs.version }}"
        ls -la dist/python-wheels || true

        wheel_count=$(find dist/python-wheels -maxdepth 1 -name '*.whl' | wc -l)
        if [ "$wheel_count" -eq 0 ]; then
          echo "No wheel artifacts found to publish."
          exit 1
        fi

        python -m pip install --upgrade pip
        python -m pip install twine
        python -m twine check dist/python-wheels/*.whl

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: collect-wheel-artifacts
    if: ${{ inputs.publish }}
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        packages-dir: dist/python-wheels

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    if: ${{ inputs.publish }}
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Download Linux wheel artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: python-dist-*
        path: dist/python-wheels
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/python-wheels
