name: Publish PlatformIO

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      owner:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      PLATFORMIO_AUTH_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  validate-platformio-metadata:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    outputs:
      library_name: ${{ steps.metadata.outputs.library_name }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Validate library.json metadata
      id: metadata
      shell: bash
      run: |
        python3 - <<'PY'
        import json
        import os
        from pathlib import Path

        expected = "${{ inputs.version }}"
        data = json.loads(Path("library.json").read_text(encoding="utf-8"))
        actual = data.get("version")
        name = data.get("name")

        if actual != expected:
            raise SystemExit(f"library.json version mismatch: expected {expected}, got {actual}")

        if not name:
            raise SystemExit("library.json is missing required field: name")

        output_path = Path(os.environ["GITHUB_OUTPUT"])
        output_path.write_text(
            f"library_name={name}\n",
            encoding="utf-8",
        )

        print(f"library.json metadata is aligned: name={name}, version={actual}")
        PY

  publish-platformio:
    runs-on: ubuntu-latest
    needs: validate-platformio-metadata
    if: ${{ inputs.publish }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install PlatformIO Core
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install platformio

    - name: Validate PlatformIO authentication token
      shell: bash
      env:
        PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      run: |
        pio account show

    - name: Publish package to PlatformIO registry
      shell: bash
      env:
        PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      run: |
        pio pkg publish \
          --owner "${{ inputs.owner }}" \
          --type library \
          --no-interactive \
          .

  post-publish-verify:
    runs-on: ubuntu-latest
    needs: [validate-platformio-metadata, publish-platformio]
    if: ${{ inputs.publish }}
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install PlatformIO Core
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install platformio

    - name: Verify package visibility in PlatformIO registry
      shell: bash
      env:
        PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      run: |
        package_spec="${{ inputs.owner }}/${{ needs.validate-platformio-metadata.outputs.library_name }}@${{ inputs.version }}"
        pio pkg show --type library --json-output "$package_spec" > platformio_package.json

        python3 - <<'PY'
        import json
        from pathlib import Path

        payload = json.loads(Path("platformio_package.json").read_text(encoding="utf-8"))
        spec = "${{ inputs.owner }}/${{ needs.validate-platformio-metadata.outputs.library_name }}@${{ inputs.version }}"

        if not payload:
            raise SystemExit(f"PlatformIO package lookup returned empty payload for {spec}")

        print(f"PlatformIO package verified: {spec}")
        PY
