name: Publish PlatformIO (Skeleton)

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-platformio-metadata:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Validate library.json version matches release version
      shell: bash
      run: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        expected = "${{ inputs.version }}"
        data = json.loads(Path("library.json").read_text(encoding="utf-8"))
        actual = data.get("version")

        if actual != expected:
            raise SystemExit(f"library.json version mismatch: expected {expected}, got {actual}")

        print(f"library.json version is aligned: {actual}")
        PY

    - name: Download PlatformIO skeleton artifacts from build-linux
      uses: actions/download-artifact@v4
      with:
        pattern: platformio-package-skeleton-*
        path: dist/platformio-skeleton
        merge-multiple: true

    - name: Show collected PlatformIO skeleton artifacts
      shell: bash
      run: |
        ls -la dist/platformio-skeleton || true

  publish-platformio:
    runs-on: ubuntu-latest
    needs: validate-platformio-metadata
    if: ${{ inputs.publish }}
    steps:
    - name: PlatformIO publish skeleton placeholder
      shell: bash
      run: |
        echo "TODO: publish package to PlatformIO registry."
        echo "Tag: ${{ inputs.tag }} | Version: ${{ inputs.version }}"

  post-publish-verify:
    runs-on: ubuntu-latest
    needs: publish-platformio
    if: ${{ inputs.publish }}
    steps:
    - name: PlatformIO verification skeleton placeholder
      shell: bash
      run: |
        echo "TODO: verify PlatformIO registry package/version visibility."
        echo "Tag: ${{ inputs.tag }} | Version: ${{ inputs.version }}"
