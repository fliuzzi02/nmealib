name: Publish PlatformIO

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      owner:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false
    secrets:
      PLATFORMIO_AUTH_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  validate-platformio-metadata:
    runs-on: ubuntu-latest
    if: ${{ inputs.publish }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Validate library.json metadata
      shell: bash
      run: |
        python3 - <<'PY'
        import json
        from pathlib import Path

        expected = "${{ inputs.version }}"
        data = json.loads(Path("library.json").read_text(encoding="utf-8"))
        actual = data.get("version")
        name = data.get("name")

        if actual != expected:
            raise SystemExit(f"library.json version mismatch: expected {expected}, got {actual}")

        if not name:
            raise SystemExit("library.json is missing required field: name")

        print(f"library.json metadata is aligned: name={name}, version={actual}")
        PY

  publish-platformio:
    runs-on: ubuntu-latest
    needs: validate-platformio-metadata
    if: ${{ inputs.publish }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install PlatformIO Core
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install platformio

    - name: Validate PlatformIO authentication token
      shell: bash
      env:
        PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      run: |
        pio account show

    - name: Publish package to PlatformIO registry
      shell: bash
      env:
        PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      run: |
        pio pkg publish \
          --owner "${{ inputs.owner }}" \
          --type library \
          --no-interactive \
          .

