name: Static Analysis

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
    outputs:
      cppcheck_exit_code:
        description: "Cppcheck exit code (0 means success)"
        value: ${{ jobs.static-analysis.outputs.cppcheck_exit_code }}
      cppcheck_summary:
        description: "Cppcheck grouped counts by error id"
        value: ${{ jobs.static-analysis.outputs.cppcheck_summary }}
      report_file:
        description: "Absolute path of the generated cppcheck XML report"
        value: ${{ jobs.static-analysis.outputs.report_file }}
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to analyze"
        required: false
        type: string

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    outputs:
      cppcheck_exit_code: ${{ steps.run-cppcheck.outputs.exit_code }}
      cppcheck_summary: ${{ steps.summarize.outputs.summary }}
      report_file: ${{ steps.run-cppcheck.outputs.report_file }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DENABLE_STATIC_ANALYSIS=ON
        -S ${{ github.workspace }}

    - name: Run cppcheck
      id: run-cppcheck
      shell: bash
      run: |
        set +e
        report_file="${{ steps.strings.outputs.build-output-dir }}/reports/cppcheck-$(date +%Y%m%d-%H%M%S).xml"
        mkdir -p "$(dirname "$report_file")"

        cppcheck \
          --project="${{ steps.strings.outputs.build-output-dir }}/compile_commands.json" \
          --enable=all \
          --inconclusive \
          --std=c++20 \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --error-exitcode=1 \
          --xml \
          --xml-version=2 \
          --output-file="$report_file"

        exit_code=$?
        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "report_file=$report_file" >> "$GITHUB_OUTPUT"

    - name: Summarize cppcheck report
      id: summarize
      if: ${{ always() }}
      shell: bash
      run: |
        report_file="${{ steps.run-cppcheck.outputs.report_file }}"
        if [[ -z "$report_file" || ! -f "$report_file" ]]; then
          {
            echo "summary<<EOF"
            echo "report_not_found: 1"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        summary=$(python3 scripts/cppcheck_summary.py "$report_file")
        {
          echo "summary<<EOF"
          echo "$summary"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
