name: Run Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    - name: Configure CMake
      run: >
        cmake -B build
        -S .
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_TESTS=ON
        -DBUILD_TESTING=ON
        -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build --config Release

    - name: Verify Python stubs are up to date
      run: |
        python -m pip install --upgrade pip
        python -m pip install pybind11-stubgen
        python -m pip install -e .
        python scripts/generate_python_stubs.py --module nmealib._core --package-dir python/nmealib --python python
        git diff --exit-code -- python/nmealib/__init__.pyi python/nmealib/_core python/nmealib/py.typed

    - name: Run all tests
      working-directory: build
      run: ctest --output-on-failure --no-tests=error

    - name: Generate coverage report
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/googletest/*' '*/googlemock/*' '*/_deps/*' --output-file coverage.info.filtered --ignore-errors unused
        lcov --list coverage.info.filtered
