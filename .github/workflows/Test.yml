name: Run Tests

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to test"
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov

    - name: Configure CMake
      run: >
        cmake -B build
        -S .
        -DCMAKE_BUILD_TYPE=Release
        -DENABLE_TESTS=ON
        -DBUILD_TESTING=ON
        -DENABLE_COVERAGE=ON

    - name: Build
      run: cmake --build build --config Release --parallel "$(nproc)"

    - name: Run all tests
      working-directory: build
      run: ctest --output-on-failure --no-tests=error

    - name: Generate coverage report
      working-directory: build
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/googletest/*' '*/googlemock/*' '*/_deps/*' --output-file coverage.info.filtered --ignore-errors unused
        lcov --list coverage.info.filtered
