name: Build Linux Matrix (Skeleton)

"on":
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-linux-binaries-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manylinux_target: [manylinux_2_28_x86_64, manylinux_2_28_aarch64]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Skeleton placeholder for CLI and library binary build
      shell: bash
      run: |
        mkdir -p out/skeleton
        cat > out/skeleton/linux-binary-${{ matrix.manylinux_target }}.txt <<'EOF'
        Skeleton only: CLI/library Linux binary build implementation will be added in a follow-up pass.
        This lane represents target ${{ matrix.manylinux_target }} for version ${{ inputs.version }} (${{ inputs.tag }}).
        EOF

    - name: Upload Linux binary skeleton artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-binary-skeleton-${{ matrix.manylinux_target }}
        path: out/skeleton/linux-binary-${{ matrix.manylinux_target }}.txt

  build-python-linux-wheels:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manylinux_target: [manylinux_2_28_x86_64, manylinux_2_28_aarch64]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.source_ref }}

    - name: Skeleton placeholder for Linux wheel build
      shell: bash
      run: |
        mkdir -p out/skeleton
        cat > out/skeleton/python-wheel-${{ matrix.manylinux_target }}.txt <<'EOF'
        Skeleton only: Linux wheel build implementation will be added in a follow-up pass.
        This lane represents target ${{ matrix.manylinux_target }} for version ${{ inputs.version }} (${{ inputs.tag }}).
        EOF

    - name: Upload Python wheel skeleton artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-wheel-skeleton-${{ matrix.manylinux_target }}
        path: out/skeleton/python-wheel-${{ matrix.manylinux_target }}.txt
