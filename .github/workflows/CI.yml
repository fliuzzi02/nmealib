name: CI

on:
  push:
    branches: [ "release/**" ]
  pull_request_target:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  static-analysis:
    permissions:
      contents: read
    uses: ./.github/workflows/StaticAnalysis.yml

  handle-static-analysis-failure:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: ${{ always() && github.event_name == 'pull_request_target' && needs.static-analysis.outputs.cppcheck_exit_code != '0' }}
    permissions:
      issues: write
      contents: read
    steps:
    - name: Post or update static analysis comment
      uses: actions/github-script@v7
      env:
        CPPCHECK_EXIT_CODE: ${{ needs.static-analysis.outputs.cppcheck_exit_code }}
        CPPCHECK_SUMMARY: ${{ needs.static-analysis.outputs.cppcheck_summary }}
      with:
        script: |
          const pr = context.payload.pull_request;
          if (!pr) {
            core.info('No pull request context available; skipping comment.');
            return;
          }

          const marker = '<!-- cppcheck-summary-comment -->';
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            marker,
            '⚠️ Static analysis failed.',
            '',
            `- Exit code: ${process.env.CPPCHECK_EXIT_CODE ?? 'unknown'}`,
            `- Workflow run: ${runUrl}`,
            '',
            'Cppcheck findings by type:',
            '```text',
            `${process.env.CPPCHECK_SUMMARY ?? 'unavailable'}`,
            '```',
          ].join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
            per_page: 100,
          });

          const existing = comments.find(c =>
            c.user?.type === 'Bot' &&
            typeof c.body === 'string' &&
            c.body.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
            return;
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
            body,
          });

  static-analysis-gate:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: ${{ always() }}
    permissions:
      contents: read
    steps:
    - name: Fail workflow when static analysis fails
      run: |
        if [ "${{ needs.static-analysis.outputs.cppcheck_exit_code }}" != "0" ]; then
          echo "Static analysis failed."
          exit 1
        fi

  test:
    needs: static-analysis-gate
    permissions:
      contents: read
    uses: ./.github/workflows/Test.yml

  handle-release-test-failure:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && needs.test.result == 'failure' && (startsWith(github.ref_name, 'release/') || startsWith(github.head_ref, 'release/')) }}
    permissions:
      issues: write
      contents: read
    steps:
    - name: Open issue for failed release test
      uses: actions/github-script@v7
      with:
        script: |
          const branch = context.eventName === 'pull_request'
            ? context.payload.pull_request?.head?.ref
            : context.ref.replace('refs/heads/', '');
          const issueTitle = `[Release Chain Failure] Tests failed on ${branch}`;
          const issueBody = [
            'Release CI path failed at test stage.',
            '',
            `- Workflow: ${context.workflow}`,
            `- Job: test`,
            `- Run ID: ${context.runId}`,
            `- Event: ${context.eventName}`,
            `- Branch: ${branch}`,
            `- Commit: ${context.sha}`,
            `- Run URL: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
          ].join('\n');
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: issueTitle,
            body: issueBody,
            labels: ['release', 'ci', 'failure']
          });

  # Only build the cross platforms if tests are passed, for now it will be disabled
  # build:
  #   needs: test
  #   if: ${{ needs.test.result == 'success' }}
  #   uses: ./.github/workflows/Build.yml

  # Run release only if we are in a release/ branch and all tests passed
  release:
    needs: test
    if: ${{ needs.test.result == 'success' && (startsWith(github.ref_name, 'release/') || startsWith(github.head_ref, 'release/')) }}
    permissions:
      contents: write
    uses: ./.github/workflows/Release.yml
    with:
      branch: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      sha: ${{ github.sha }}
      publish: ${{ github.event_name == 'push' }}
    secrets: inherit
