site_name: nmealib
site_description: NMEA 0183 / NMEA 2000 parsing library documentation
site_url: https://fliuzzi02.github.io/nmealib/
repo_url: https://github.com/fliuzzi02/nmealib
repo_name: fliuzzi02/nmealib
docs_dir: .mkdocs-src

theme:
  name: material
  language: en

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code

nav:
  - Home: index.md
  - Installation: docs/INSTALLATION.md
  - Architecture: docs/ARCHITECTURE.md
  - Protocol Support: docs/PROTOCOL_SUPPORT.md
  - Examples: docs/EXAMPLES.md
  - Contributing: docs/CONTRIBUTING.md
  - API Overview: docs/API.md
